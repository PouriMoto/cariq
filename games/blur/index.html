<!-- games/blur/index.html -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="description" content="حدس بزنید ماشین از پشت مه کدومه! | CarIQ"/>
  <title>کدوم ماشینه؟ | CarIQ</title>
  <link rel="stylesheet" href="../../assets/css/tokens.css"/>
  <link rel="stylesheet" href="../../assets/css/base.css"/>
  <link rel="stylesheet" href="../../assets/css/components.css"/>
  <style>
    /* ── Blur Game Specific ── */
    .blur-stage {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--c-bg3);
      border-radius: var(--r);
      overflow: hidden;
      border: 1px solid var(--c-border);
      margin-bottom: 12px;
    }
    .blur-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.7s ease;
    }
    .blur-stage-top {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    .blur-stage-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 12px 10px;
      background: linear-gradient(transparent, rgba(44, 24, 16, 0.6));
      font-size: 11px;
      color: rgba(245, 240, 232, 0.8);
      text-align: center;
    }
    .opts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .opt-btn {
      padding: 13px 10px;
      background: var(--c-card2);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-sm);
      color: var(--c-text);
      font-weight: 700;
      font-size: 13px;
      text-align: center;
      transition: all 0.18s;
      cursor: pointer;
      font-family: inherit;
    }
    .opt-btn:not([disabled]):hover {
      border-color: var(--c-gold2);
      color: var(--c-gold);
      background: rgba(184, 134, 11, 0.06);
    }
    .opt-btn.opt-correct {
      background: rgba(45, 122, 79, 0.1);
      border-color: var(--c-green);
      color: var(--c-green);
    }
    .opt-btn.opt-wrong {
      background: rgba(184, 50, 50, 0.08);
      border-color: var(--c-red);
      color: var(--c-red);
    }
    .opt-btn[disabled] {
      cursor: default;
    }
    .hint-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--c-border2);
      border-radius: var(--r-sm);
      color: var(--c-muted);
      font-size: 12px;
      font-weight: 600;
      transition: all 0.18s;
      margin-bottom: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .hint-btn:not([disabled]):hover {
      border-color: var(--c-accent2);
      color: var(--c-accent);
    }
    .hint-btn[disabled] {
      opacity: 0.4;
      cursor: default;
    }
    .dots-row {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .dot-step {
      height: 4px;
      border-radius: 4px;
      background: var(--c-bg3);
      transition: all 0.35s;
    }
    .dot-step.done {
      background: var(--c-gold2);
    }
    .dot-step.now {
      background: var(--c-gold3);
      box-shadow: 0 0 6px var(--c-gold-glow);
    }

    /* ── Result ── */
    .result-detail-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--c-border);
      font-size: 13px;
      color: var(--c-muted);
    }
    .result-detail-item:last-child {
      border: none;
    }
    .result-detail-item .ok {
      color: var(--c-green);
    }
    .result-detail-item .bad {
      color: var(--c-red);
    }
    .result-rank {
      font-size: 13px;
      color: var(--c-muted);
      margin-top: 6px;
    }

    @media (max-width: 380px) {
      .opts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="game-root"></div>
  </div>

  <script src="../../core/config.js"></script>
  <script src="../../core/car-db.js"></script>
  <script src="../../core/shared.js"></script>
  <script src="../../core/lead-engine.js"></script>
  <script src="../../assets/js/utils.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════════
       GAME META — اطلاعات بازی برای لابی
       ═══════════════════════════════════════════════════════ */
    window.GAME_META = {
      id: 'blur',
      name: 'کدوم ماشینه؟',
      icon: '🔍',
      rounds: 6,
      estimatedTime: '۲ دقیقه',
      viralScore: 9,
      leadQuality: 8,
      description: 'تصویر تاریه — با هر جواب واضح‌تر می‌شه!',
    };

    /* ═══════════════════════════════════════════════════════
       GAME API — رابط استاندارد بازی
       ═══════════════════════════════════════════════════════ */
    window.GAME_API = {
      _state: null,
      _root: null,
      _initialized: false,

      /* ── مقداردهی اولیه ── */
      init(container) {
        this._root = container;
        this._state = this._createInitialState();
        this._render();
        this._initialized = true;
      },

      /* ── بازنشانی ── */
      reset() {
        if (this._root) {
          this._state = this._createInitialState();
          this._render();
        }
      },

      /* ── دریافت نتیجه ── */
      getResult() {
        if (!this._state) return null;
        const ok = this._state.results.filter(r => r.ok).length;
        const total = this._state.results.length || 1;
        const pct = Math.round((ok / total) * 100);
        return {
          score: this._state.score,
          pct: pct,
          summary: `${ok} از ${total} درست`,
          profileData: {
            blur_score: this._state.score,
            blur_accuracy: pct,
            blur_total: total,
          },
        };
      },

      /* ── پاکسازی ── */
      destroy() {
        this._root = null;
        this._state = null;
        this._initialized = false;
      },

      /* ── وضعیت اولیه ── */
      _createInitialState() {
        const deck = this._pickRandomCars(CarIQDB.getAll(), 6);
        return {
          deck: deck,
          idx: 0,
          score: 0,
          blur: 22,
          answered: false,
          hints: 0,
          results: [],
          opts: null,
        };
      },

      /* ── انتخاب تصادفی ── */
      _pickRandomCars(cars, count) {
        const shuffled = [...cars];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
      },

      /* ── انتخاب گزینه‌ها ── */
      _pickOptions(car) {
        const others = CarIQDB.getAll().filter(c => c.id !== car.id);
        const shuffled = [...others];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const picks = shuffled.slice(0, 3);
        const options = [car, ...picks];
        for (let i = options.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [options[i], options[j]] = [options[j], options[i]];
        }
        return options;
      },

      /* ═══════════════════════════════════════════════════════
         RENDER
         ═══════════════════════════════════════════════════════ */
      _render() {
        const root = this._root;
        if (!root) return;

        const state = this._state;
        const deck = state.deck;

        // ── پایان بازی ──
        if (state.idx >= deck.length) {
          this._renderResult(root, state);
          return;
        }

        const car = deck[state.idx];
        if (!state.opts) {
          state.opts = this._pickOptions(car);
        }

        root.innerHTML = '';

        // ── هدر ──
        const header = CarIQShared.buildGameHeader({
          title: '🔍 کدوم ماشینه؟',
          sub: `دور ${state.idx + 1} از ${deck.length}`,
          onBack: () => {
            if (confirm('از بازی خارج می‌شید؟')) {
              window.location.href = '../../index.html';
            }
          },
        });
        root.appendChild(header.header);

        // ── HUD ──
        const correct = state.results.filter(r => r.ok).length;
        const wrong = state.results.filter(r => !r.ok).length;
        const hud = CarIQShared.el('div', { class: 'hud' });
        hud.appendChild(
          CarIQShared.el('div', { class: 'hud-item ok' },
            CarIQShared.el('div', { class: 'hv' }, String(correct)),
            CarIQShared.el('div', { class: 'hl' }, 'درست')
          )
        );
        hud.appendChild(
          CarIQShared.el('div', { class: 'hud-item bad' },
            CarIQShared.el('div', { class: 'hv' }, String(wrong)),
            CarIQShared.el('div', { class: 'hl' }, 'اشتباه')
          )
        );
        hud.appendChild(
          CarIQShared.el('div', { class: 'hud-item pts' },
            CarIQShared.el('div', { class: 'hv' }, String(state.score)),
            CarIQShared.el('div', { class: 'hl' }, 'امتیاز')
          )
        );
        root.appendChild(hud);

        // ── دات‌ها ──
        const dotsRow = CarIQShared.el('div', { class: 'dots-row' });
        const maxWidth = Math.min(window.innerWidth, 480);
        const dotWidth = Math.max(18, (maxWidth - 60) / deck.length - 6);
        for (let i = 0; i < deck.length; i++) {
          const cls = i < state.idx ? 'done' : i === state.idx ? 'now' : '';
          const dot = CarIQShared.el('div', {
            class: `dot-step ${cls}`,
            style: { width: dotWidth + 'px' },
          });
          dotsRow.appendChild(dot);
        }
        root.appendChild(dotsRow);

        // ── تصویر ──
        const stage = CarIQShared.el('div', { class: 'blur-stage' });
        const img = CarIQShared.el('img', {
          src: car.img || CarIQShared.svgPlaceholder(car.name),
          alt: car.name,
          style: {
            filter: `blur(${state.blur}px) saturate(${state.blur > 12 ? 0.5 : 0.85})`,
          },
        });
        img.onerror = () => {
          img.src = CarIQShared.svgPlaceholder(car.name);
        };

        const top = CarIQShared.el('div', { class: 'blur-stage-top' });
        top.appendChild(
          CarIQShared.el('span', { class: 'pill pill-muted' }, car.tag || car.brand || '')
        );
        top.appendChild(
          CarIQShared.el('span', { class: 'pill pill-gold' }, `⭐ ${state.score}`)
        );

        stage.appendChild(img);
        stage.appendChild(top);

        if (state.blur <= 1) {
          stage.appendChild(
            CarIQShared.el('div', { class: 'blur-stage-bottom' }, '✅ تصویر کاملاً واضحه!')
          );
        }
        root.appendChild(stage);

        // ── گزینه‌ها ──
        const grid = CarIQShared.el('div', { class: 'opts-grid' });
        state.opts.forEach(opt => {
          const btn = CarIQShared.el('button', { class: 'opt-btn' }, opt.name);
          btn.addEventListener('click', () => {
            if (!state.answered) {
              this._handleAnswer(opt, btn, grid);
            }
          });
          grid.appendChild(btn);
        });
        root.appendChild(grid);

        // ── دکمه راهنما ──
        const hintPoints = state.hints === 0 ? 50 : state.hints === 1 ? 35 : state.hints === 2 ? 20 : 10;
        const hintBtn = CarIQShared.el('button', { class: 'hint-btn' },
          state.blur > 1
            ? `👁️ واضح‌تر کن — امتیاز ${hintPoints} (${deck.length - state.idx} دور مانده)`
            : '✅ تصویر کاملاً واضحه'
        );
        if (state.blur <= 1 || state.answered) {
          hintBtn.disabled = true;
        }
        hintBtn.addEventListener('click', () => {
          state.blur = Math.max(1, state.blur - 8);
          state.hints++;
          this._render();
        });
        root.appendChild(hintBtn);
      },

      /* ── پاسخ ── */
      _handleAnswer(picked, btn, grid) {
        const state = this._state;
        if (state.answered) return;
        state.answered = true;

        const car = state.deck[state.idx];
        const ok = picked.id === car.id;
        const pts = ok
          ? (state.hints === 0 ? 50 : state.hints === 1 ? 35 : state.hints === 2 ? 20 : 10)
          : 0;

        state.score += pts;
        state.results.push({ name: car.name, ok, pts });

        // نشان دادن پاسخ
        const children = grid.children;
        for (let i = 0; i < children.length; i++) {
          const b = children[i];
          b.disabled = true;
          if (b.textContent === car.name) {
            b.classList.add('opt-correct');
          } else if (b === btn && !ok) {
            b.classList.add('opt-wrong');
          }
        }

        // واضح کردن تصویر
        const img = this._root.querySelector('.blur-stage img');
        if (img) {
          img.style.transition = 'filter 0.8s ease';
          img.style.filter = 'none';
        }

        // پرش امتیاز
        if (pts > 0) {
          CarIQShared.showScoreFly(pts);
        }

        // مرحله بعد
        setTimeout(() => {
          state.idx++;
          state.blur = 22;
          state.answered = false;
          state.hints = 0;
          state.opts = null;
          this._render();
        }, 1700);
      },

      /* ── نتیجه ── */
      _renderResult(root, state) {
        const ok = state.results.filter(r => r.ok).length;
        const total = state.results.length;
        const pct = Math.round((ok / total) * 100);

        let emoji, rank, rankClass;
        if (pct >= 83) {
          emoji = '🏆';
          rank = 'ماشین‌شناس افسانه‌ای!';
          rankClass = 'pill-gold';
        } else if (pct >= 50) {
          emoji = '🔥';
          rank = 'خبره ماشین!';
          rankClass = 'pill-green';
        } else {
          emoji = '😅';
          rank = 'تازه‌کار — تمرین کن!';
          rankClass = 'pill-muted';
        }

        // ذخیره در پروفایل
        CarIQLeads.trackGameEnd('blur', `${ok}/${total} - ${state.score}pts`);
        CarIQLeads.mergeProfile({
          blur_score: state.score,
          blur_accuracy: pct,
        });

        root.innerHTML = '';

        // ── هدر ──
        const header = CarIQShared.buildGameHeader({
          title: '🏁 نتیجه نهایی',
          sub: `امتیاز: ${state.score}`,
          onBack: () => {
            window.location.href = '../../index.html';
          },
        });
        root.appendChild(header.header);

        // ── هیرو ──
        const hero = CarIQShared.el('div', { class: 'result-hero' });
        hero.appendChild(CarIQShared.el('div', { class: 'result-emoji' }, emoji));
        hero.appendChild(
          CarIQShared.el('div', { class: 'result-car-name', style: { marginTop: '0' } },
            `${state.score} امتیاز`
          )
        );
        hero.appendChild(
          CarIQShared.el('span', { class: `pill ${rankClass}` }, rank)
        );
        hero.appendChild(
          CarIQShared.el('div', { class: 'result-rank' },
            `${ok} از ${total} ماشین رو درست شناختی`
          )
        );
        root.appendChild(hero);

        // ── جزئیات ──
        const detail = CarIQShared.el('div', { class: 'card mt12' });
        detail.appendChild(
          CarIQShared.el('div', { class: 'section-label' },
            CarIQShared.el('span', {}, '📋 جزئیات دورها')
          )
        );
        state.results.forEach((r, i) => {
          const row = CarIQShared.el('div', { class: 'result-detail-item' });
          row.appendChild(CarIQShared.el('span', {}, `دور ${i + 1}: ${r.name}`));
          row.appendChild(
            CarIQShared.el('span', { class: r.ok ? 'ok' : 'bad' },
              r.ok ? `✓ +${r.pts}` : '✗'
            )
          );
          detail.appendChild(row);
        });
        root.appendChild(detail);

        // ── دوباره ──
        const again = CarIQShared.el('button', { class: 'btn btn-outline mt12' }, '🔄 بازی مجدد');
        again.addEventListener('click', () => {
          this._state = this._createInitialState();
          this._render();
        });
        root.appendChild(again);

        // ── Lead Box ──
        const cfg = CarIQConfig.get();
        const leadBox = CarIQShared.buildLeadBox({
          source: 'blur',
          resultText: `${ok}/${total} — ${state.score}pts`,
          ctaMsg: `سلام! تو بازی حدس ماشین ${ok} از ${total} رو درست زدم و ${state.score} امتیاز گرفتم. می‌خوام درباره واردات مشاوره کنم 🚗`,
          sharePayload: {
            emoji: '🔍',
            text: `${state.score} امتیاز تو بازی «کدوم ماشینه؟» گرفتم! تو هم امتحان کن 🚗`,
          },
        });
        root.appendChild(leadBox);
      },
    };

    /* ═══════════════════════════════════════════════════════
       BOOTSTRAP
       ═══════════════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      CarIQShared.initStandaloneGame('game-root');
    });
  </script>
</body>
</html>
